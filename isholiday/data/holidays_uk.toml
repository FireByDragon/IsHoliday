# =============================================================================
# United Kingdom — England & Wales Bank Holidays
# =============================================================================
#
# Bank holidays observed in England and Wales under the Banking and Financial
# Dealings Act 1971 (as amended).
#
# COVERAGE: 8 of 8 standard bank holidays.
#
# Holiday type codes:
#   DOM    — Calendar Day of Month: fixed date (e.g., December 25th)
#   NOW    — Nth Weekday of Month: relative date (e.g., last Monday in May)
#   EASTER — Offset from Easter Sunday (e.g., Good Friday = Easter − 2)
#
# Weekday values use SQL Server convention:
#   1=Sunday, 2=Monday, 3=Tuesday, 4=Wednesday, 5=Thursday, 6=Friday, 7=Saturday
#
# Special sentinel: week = 10 means "last occurrence of that weekday in the month"
#
# Observed-date rules:
#   When a bank holiday falls on a weekend, the "substitute day" is the next
#   available weekday (typically Monday, or Tuesday if Monday is also a holiday).
#   IsHoliday handles Saturday→Monday and Sunday→Monday shifting natively.
#   The Boxing Day + Christmas double-shift (Tue substitute) requires the
#   adjacent-holiday logic to be added in a future version.
#
# =============================================================================

[calendar]
name        = "uk"
description = "United Kingdom bank holidays — England & Wales (8 holidays)"

[types]
DOM    = "Calendar Day of Month — fixed date (e.g., Dec 25)"
NOW    = "Nth Weekday of Month — relative date (e.g., last Monday in May)"
EASTER = "Offset from Easter Sunday (e.g., Good Friday = Easter − 2)"

# -----------------------------------------------------------------------------
# January
# -----------------------------------------------------------------------------

[[holidays]]
name               = "New Year's Day"
type               = "DOM"
month              = 1
day                = 1
week               = 0
weekday            = 0
saturday_to_friday = false
sunday_to_monday   = true
year_added         = 1974
enabled            = true

# -----------------------------------------------------------------------------
# March / April (Easter-dependent)
# -----------------------------------------------------------------------------

[[holidays]]
name               = "Good Friday"
type               = "EASTER"
month              = 0
day                = 0
week               = 0
weekday            = 0
offset             = -2
saturday_to_friday = false
sunday_to_monday   = false
year_added         = 1871
enabled            = true

[[holidays]]
name               = "Easter Monday"
type               = "EASTER"
month              = 0
day                = 0
week               = 0
weekday            = 0
offset             = 1
saturday_to_friday = false
sunday_to_monday   = false
year_added         = 1871
enabled            = true

# -----------------------------------------------------------------------------
