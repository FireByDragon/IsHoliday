# =============================================================================
# Canada — Federal Statutory Holidays
# =============================================================================
#
# Federal holidays observed across all provinces and territories under the
# Canada Labour Code.
#
# COVERAGE: 7 of 9 federal statutory holidays. Excludes Easter-dependent
# holidays (Good Friday, Easter Monday) which require a future EASTER rule type.
#
# Holiday type codes:
#   DOM — Calendar Day of Month: fixed date (e.g., July 1st)
#   NOW — Nth Weekday of Month: relative date (e.g., 1st Monday in September)
#
# Weekday values use SQL Server convention:
#   1=Sunday, 2=Monday, 3=Tuesday, 4=Wednesday, 5=Thursday, 6=Friday, 7=Saturday
#
# Special sentinel: week = 10 means "last occurrence of that weekday in the month"
#
# Observed-date rules:
#   When a federal holiday falls on a weekend, it is typically observed on the
#   following Monday.
#
# NOT INCLUDED (require future rule types):
#   - Good Friday (Easter - 2 days) — needs EASTER rule type
#   - Easter Monday (Easter + 1 day) — needs EASTER rule type
#   - Victoria Day (Monday on or before May 24) — needs BEFORE rule type
#
# NOTE: Provincial holidays vary significantly. This file covers federal
# holidays only. Create province-specific TOML files for full coverage
# (e.g., holidays_canada_on.toml for Ontario, holidays_canada_qc.toml
# for Québec).
#
# =============================================================================

[calendar]
name        = "canada"
description = "Canada federal statutory holidays (6 of 9, excludes Easter-dependent and Victoria Day)"

[types]
DOM = "Calendar Day of Month — fixed date (e.g., Jul 1)"
NOW = "Nth Weekday of Month — relative date (e.g., 1st Monday in September)"

# -----------------------------------------------------------------------------
# January
# -----------------------------------------------------------------------------

[[holidays]]
name               = "New Year's Day"
type               = "DOM"
month              = 1
day                = 1
week               = 0
weekday            = 0
saturday_to_friday = false
sunday_to_monday   = true
year_added         = 1867
enabled            = true

