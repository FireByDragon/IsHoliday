# =============================================================================
# Japan — National Holidays (国民の祝日)
# =============================================================================
#
# National holidays defined by the Act on National Holidays (国民の祝日に関する法律).
#
# COVERAGE: 14 of 16 national holidays. Excludes Vernal Equinox Day and
# Autumnal Equinox Day, which require astronomical calculation or annual
# lookup tables (dates shift by ±1 day based on the solar equinox).
#
# Holiday type codes:
#   DOM — Calendar Day of Month: fixed date (e.g., January 1st)
#   NOW — Nth Weekday of Month: relative date (e.g., 2nd Monday in January)
#
# Weekday values use SQL Server convention:
#   1=Sunday, 2=Monday, 3=Tuesday, 4=Wednesday, 5=Thursday, 6=Friday, 7=Saturday
#
# Observed-date rules:
#   Japan uses the "振替休日" (furikae kyūjitsu / substitute holiday) system:
#   when a national holiday falls on Sunday, the following Monday becomes a
#   substitute holiday. Saturday holidays are NOT shifted.
#
# NOT INCLUDED (require lookup tables):
#   - Vernal Equinox Day (春分の日) — ~March 20-21, varies by year
#   - Autumnal Equinox Day (秋分の日) — ~September 22-23, varies by year
#
# NOTE: Japan also recognizes "sandwiched day" holidays (国民の休日): if a
# day falls between two national holidays, it becomes a holiday. This requires
# post-computation logic not yet supported.
#
# =============================================================================

[calendar]
name        = "japan"
description = "Japan national holidays (14 of 16, excludes equinox-dependent)"

[types]
DOM = "Calendar Day of Month — fixed date (e.g., Jan 1)"
NOW = "Nth Weekday of Month — relative date (e.g., 2nd Monday in January)"

# -----------------------------------------------------------------------------
